services:
  # ---------- Front‑end (static site) ----------
  - type: web
    name: farmshield-frontend
    env: static
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist

  # ---------- Back‑end (Node/Express) ----------
  - type: web
    name: farmshield-backend
    env: node
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # ---------- ML‑service (Python) ----------
  - type: web
    name: farmshield-ml
    env: python
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: HF_API_TOKEN
        sync: false
