services:
  # ---------- Front‑end (static site) ----------
  - type: static
    name: farmshield-frontend
    env: node
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: client/dist

  # ---------- Back‑end (Node/Express) ----------
  - type: web
    name: farmshield-backend
    env: node
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      MONGODB_URI: ${MONGODB_URI}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      # add any other secrets here

  # ---------- ML‑service (Python) ----------
  - type: web
    name: farmshield-ml
    env: python
    repo: https://github.com/<YOUR_USERNAME>/farmshield-ai
    branch: main
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      # Example secret – replace with your own token if needed
      HF_API_TOKEN: ${HF_API_TOKEN}
